<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Reserva Alojamiento</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .error {
      color: red;
      border: 1px solid red;
      padding: 10px;
      margin-bottom: 10px;
    }

    .ok {
      color: green;
    }
  </style>
</head>

<body class="bg-light">

  <div class="mt-4 container min-vh-100 d-flex flex-column justify-content-center align-items-center">

    <div class="card shadow p-4" style="width: 800px;">
      <h1 class="mb-4 text-center">Reserva tu estancia</h1>

      <div id="errores"></div>

      <form id="formReserva">

        <div class="mb-3">
          <label class="form-label">Nombre completo:</label>
          <input type="text" id="nombre" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Email:</label>
          <input type="text" id="email" class="form-control">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Fecha entrada:</label>
            <input type="date" id="entrada" class="form-control">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Fecha salida:</label>
            <input type="date" id="salida" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Huéspedes:</label>
          <input type="number" id="huespedes" min="1" value="1" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo habitación:</label>
          <select id="habitacion" class="form-select">
            <option value="individual">Individual</option>
            <option value="doble">Doble</option>
            <option value="suite">Suite</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Extras:</label><br>
          <div class="form-check">
            <input type="checkbox" id="desayuno" class="form-check-input">
            <label class="form-check-label">Desayuno</label>
          </div>
          <div class="form-check">
            <input type="checkbox" id="parking" class="form-check-input">
            <label class="form-check-label">Parking</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Código descuento:</label>
          <input type="text" id="codigo" class="form-control">
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Reservar</button>
          <button type="button" id="limpiar" class="btn btn-secondary">Limpiar</button>
        </div>

      </form>
    </div>

    <div class="mb-3 card shadow p-4 mt-4" style="width: 800px;">
      <h2>Resumen</h2>
      <div id="resumen"></div>

      <h3 class="mt-3">Precio estimado: <span id="precioEstimado">0€</span></h3>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
