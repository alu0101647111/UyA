<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pagina de Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  </head>
  <body>
    <!-- Barra de navegacion -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">AEMET</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="main.html">Página principal</a>
            </li>
          </ul>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Buscar" aria-label="Search"/>
            <button class="btn btn-outline-success" type="submit">Buscar</button>
          </form>
        </div>
      </div>
    </nav>
    <div class="container min-vh-100 d-flex flex-column justify-content-center align-items-center">
      <h1 class="mb-4" fw-bold>Iniciar sesion</h1>
      <form class="w-100" style="max-width: 420px;">
        <div class="mb-3 text-start">
          <label for="inputEmail1" class="form-label">Dirección de correo electrónico</label>
          <input type="email" class="form-control" id=inputEmail1" aria-describedby="emailHelp" placeholder="Introducir email">
          <div id="emailHelp" class="form-text"></div>
        </div>
        <div class="mb-3 text-start">
          <label for="inputPassword1" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="inputPassword1" placeholder="Contraseña">
        </div>
        <div class="form-check mb-3 text-start">
          <input type="checkbox" class="form-check-input" id="check1">
          <label class="form-check-label" for="check1">Mantener sesion iniciada</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">Acceder</button>
        <!--Login con sociales-->
        <div class="text-center">
          <p>No tienes cuenta? <a href="#!">Registrate</a></p>
          <p>Iniciar sesion con:</p>
          <button  data-mdb-ripple-init type="button" class="btn btn-secondary btn-floating mx-1">
            <i class="fa-brands fa-facebook-f"></i>
          </button>

          <button  data-mdb-ripple-init type="button" class="btn btn-secondary btn-floating mx-1">
            <i class="fa-brands fa-google"></i>
          </button>

          <button  data-mdb-ripple-init type="button" class="btn btn-secondary btn-floating mx-1">
            <i class="fa-brands fa-x-twitter"></i>
          </button>
        </div>
      </form>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </div>
    
  </body>
</html>
