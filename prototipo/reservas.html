<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservar Traslado - Tenerife Transfers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tenerife Transfers</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservas.html">Reservar Traslado</a></li>
          <li class="nav-item"><a class="nav-link" href="gestion.html">Mis Reservas</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow">
          <div class="card-header bg-primary text-white">
            <h2 class="h4 mb-0">Solicitud de Reserva de Traslado</h2>
          </div>
          <div class="card-body">
            <form
              data-mensaje="Simulación: Tu solicitud de reserva ha sido registrada con éxito. Nos pondremos en contacto pronto.">
              <h5 class="mb-3 text-muted">Datos del Viaje</h5>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Punto de Recogida</label>
                  <select class="form-select">
                    <option>Aeropuerto Tenerife Sur (TFS)</option>
                    <option>Aeropuerto Tenerife Norte (TFN)</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Destino (Hotel, Municipio, etc.)</label>
                  <input type="text" class="form-control" placeholder="Ej. Costa Adeje" required>
                </div>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Fecha de llegada</label>
                  <input type="date" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Hora del vuelo</label>
                  <input type="time" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Pasajeros</label>
                  <input type="number" class="form-control" min="1" max="8" value="2" required>
                </div>
              </div>
              <hr>
              <h5 class="mb-3 text-muted">Datos de Contacto</h5>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Nombre Completo</label>
                  <input type="text" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Correo Electrónico</label>
                  <input type="email" class="form-control" required>
                </div>
              </div>
              <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-success btn-lg">Calcular Precio y Confirmar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2026 Tenerife Transfers. Todos los derechos reservados.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
