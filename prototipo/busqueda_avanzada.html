<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Reserva - Tenerife Transfers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top" aria-label="Barra de navegación">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tenerife Transfers</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservas.html">Reservar Traslado</a></li>
          <li class="nav-item"><a class="nav-link" href="gestion.html">Mis Reservas</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container mt-5 mb-5" aria-label="Búsqueda avanzada de reservas">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="text-center mb-5">
          <h2>Búsqueda Avanzada de Reservas</h2>
          <p class="text-muted">Filtra tus servicios utilizando los criterios específicos a continuación.</p>
        </div>

        <div class="card shadow">
          <div class="card-body p-4">
            <form>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Estado de la Reserva</label>
                  <select class="form-select">
                    <option selected>Todos los estados</option>
                    <option value="1">Confirmada</option>
                    <option value="2">Pendiente de pago</option>
                    <option value="3">Cancelada</option>
                    <option value="4">Finalizada</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label class="form-label">Tipo de Vehículo</label>
                  <select class="form-select">
                    <option selected>Cualquier tipo</option>
                    <option value="1">Estándar (1-4 pax)</option>
                    <option value="2">Minivan (5-8 pax)</option>
                    <option value="3">Premium / VIP</option>
                    <option value="4">Adaptado (PMR)</option>
                  </select>
                </div>

                <div class="col-md-4 mb-3">
                  <label class="form-label">Conductor Asignado</label>
                  <select class="form-select">
                    <option selected>Cualquier conductor</option>
                    <option value="1">Juan Pérez</option>
                    <option value="2">María García</option>
                    <option value="3">Carlos Rodríguez</option>
                    <option value="4">Sin asignar</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-3 mb-3">
                  <label class="form-label">Mes del Viaje</label>
                  <select class="form-select">
                    <option selected>Enero</option>
                    <option>Febrero</option>
                    <option>Marzo</option>
                    <option>Abril</option>
                    <option>Mayo</option>
                    <option>Junio</option>
                    <option>Julio</option>
                    <option>Agosto</option>
                    <option>Septiembre</option>
                    <option>Octubre</option>
                    <option>Noviembre</option>
                    <option>Diciembre</option>
                  </select>
                </div>

                <div class="col-md-3 mb-3">
                  <label class="form-label">Año</label>
                  <select class="form-select">
                    <option>2024</option>
                    <option>2025</option>
                    <option selected>2026</option>
                  </select>
                </div>

                <div class="col-md-3 mb-3">
                  <label class="form-label">Método de Pago</label>
                  <select class="form-select">
                    <option selected>Todos los métodos</option>
                    <option>Tarjeta de Crédito</option>
                    <option>Efectivo al conductor</option>
                    <option>Transferencia Bancaria</option>
                    <option>PayPal</option>
                  </select>
                </div>

                <div class="col-md-3 mb-3">
                  <label class="form-label">Zona de Destino</label>
                  <select class="form-select">
                    <option selected>Toda la isla</option>
                    <option>Zona Norte</option>
                    <option>Zona Sur</option>
                    <option>Área Metropolitana</option>
                  </select>
                </div>
              </div>

              <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary px-5">Aplicar Filtros</button>
                <button type="reset" class="btn btn-outline-danger">Limpiar</button>
                <a href="reservas.html" class="btn btn-link">Volver a Reservas</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0">© 2026 Tenerife Transfers. Todos los derechos reservados.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
