<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Reservas - Tenerife Transfers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Barra de navegación que apunta a los diferentes apartados del sitio web -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top" aria-label="Barra de navegación">
    <div class="container">
      <a class="navbar-brand" href="index.html">Tenerife Transfers</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="reservas.html">Reservar Traslado</a></li>
          <li class="nav-item"><a class="nav-link active" href="gestion.html">Mis Reservas</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!--Apartado de gestión de reservas-->
  <main class="container mt-5 mb-5" aria-label="Gestión de reservas">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="text-center mb-4">
          <h2>Gestionar mis Reservas</h2>
          <p class="text-muted">Introduce tus datos para ver, modificar o cancelar tu traslado.</p>
        </div>
        <div class="card shadow">
          <div class="card-body p-4">
            <!--Formulario para gestionar reservas con campos para el código de reserva y correo electrónico, con un mensaje simulado al enviar el formulario -->
            <form>
              <div class="mb-3">
                <label class="form-label">Código de Reserva</label>
                <input type="text" class="form-control text-uppercase" placeholder="Ej. TFE-8492" required>
              </div>
              <div class="mb-4">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" placeholder="El email que usaste para reservar" required>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-primary">Buscar Reserva</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto" aria-label="Pie de página">
    <p class="mb-0">© 2026 Tenerife Transfers. Todos los derechos reservados.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
