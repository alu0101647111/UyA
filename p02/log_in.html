<h1>Log in</h1>
<!--Implementación de un formulario de inicio de sesión-->
<form>
  <label for="gmail">Gmail:</label><br>
  <input type="text" required name="gmail"><br>
  <label for="password">Contraseña:</label><br>
  <input type="password" required name="password"><br>
  <label for="checkbox">Stay logged in:</label>
  <!--4 -> click de check-->
  <input type="checkbox" value="Stay logged in"><br><br>
  <!--5 -> Botón de acceso-->
  <button type="button" onclick=window.location.href="main.html"> Acceder</button>

</form>
